<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UniBot - Professor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }

        /* Menu lateral */
        .menu {
            width: 250px;
            background: #1a1a2e;
            color: white;
            position: fixed;
            height: 100%;
            padding: 20px;
        }

        .menu h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        .menu button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            border: none;
            color: white;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .menu button:hover, .menu button.ativo {
            background: #667eea;
        }

        .sair {
            margin-top: 50px;
            background: #e53e3e !important;
            text-align: center !important;
        }

        /* Conteúdo */
        .conteudo {
            margin-left: 250px;
            padding: 30px;
        }

        .pagina {
            display: none;
        }

        .pagina.ativa {
            display: block;
        }

        /* Cards */
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .valor-grande {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f5f5f5;
        }

        /* Formulários */
        select, input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .aluno-item {
            background: #f8f9fa;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nota-aluno {
            font-weight: bold;
            font-size: 18px;
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        @media (max-width: 700px) {
            .menu {
                width: 100%;
                height: auto;
                position: relative;
            }
            .conteudo {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="menu">
    <h2>🎓 UniBot</h2>
    <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:20px; text-align:center">
        <div id="nomeProfessor"></div>
        <small id="disciplinaProfessor"></small>
    </div>
    <button class="btn-menu ativo" data-pagina="home">📊 Dashboard</button>
    <button class="btn-menu" data-pagina="notas">📝 Lançar Notas</button>
    <button class="btn-menu sair" id="sairBtn">🚪 Sair</button>
</div>

<div class="conteudo">
    <!-- PÁGINA DASHBOARD -->
    <div id="home" class="pagina ativa">
        <h1>📊 Dashboard</h1>
        <div class="card">
            <h3>👨‍🎓 Total de Alunos</h3>
            <div class="valor-grande" id="totalAlunos">-</div>
        </div>
        <div class="card">
            <h3>📊 Média da Turma</h3>
            <div class="valor-grande" id="mediaTurma">-</div>
        </div>
        <div class="card">
            <h3>📈 Aprovados / Reprovados</h3>
            <div id="estatisticas"></div>
        </div>
    </div>

    <!-- PÁGINA LANÇAR NOTAS -->
    <div id="notas" class="pagina">
        <h1>📝 Lançar Notas</h1>
        <div class="card">
            <h3>Selecione o aluno e digite a nota</h3>
            <select id="selectAluno">
                <option value="">Carregando alunos...</option>
            </select>
            <input type="number" id="notaAluno" step="0.5" min="0" max="10" placeholder="Nota (0 a 10)">
            <button id="salvarNotaBtn">💾 Salvar Nota</button>
        </div>
        
        <div class="card">
            <h3>📋 Lista de Alunos</h3>
            <div id="listaAlunos">
                <div class="loading">Carregando...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Dados do professor (vem do login)
    const professor = JSON.parse(localStorage.getItem('usuario'));
    if (!professor || localStorage.getItem('tipo') !== 'professor') {
        window.location = '/';
    }

    // Mostrar dados do professor
    document.getElementById('nomeProfessor').innerHTML = `👋 ${professor.nome}`;
    document.getElementById('disciplinaProfessor').innerHTML = professor.disciplina || 'Programação';

    let listaAlunos = [];

    // ========== CARREGAR ALUNOS ==========
    async function carregarAlunos() {
        try {
            console.log('Buscando alunos...');
            const res = await fetch('/api/alunos');
            
            if (!res.ok) {
                throw new Error('Erro ao buscar alunos');
            }
            
            listaAlunos = await res.json();
            console.log('Alunos carregados:', listaAlunos.length);
            
            // Atualizar dashboard
            const total = listaAlunos.length;
            let soma = 0;
            listaAlunos.forEach(a => soma += (a.nota || 0));
            const media = total > 0 ? (soma / total).toFixed(1) : 0;
            const aprovados = listaAlunos.filter(a => (a.nota || 0) >= 6).length;
            const reprovados = total - aprovados;
            
            document.getElementById('totalAlunos').innerHTML = total;
            document.getElementById('mediaTurma').innerHTML = media;
            document.getElementById('estatisticas').innerHTML = `
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <span style="color: #48bb78;">✅ Aprovados: ${aprovados}</span>
                    <span style="color: #f56565;">❌ Reprovados: ${reprovados}</span>
                </div>
            `;
            
            // Atualizar select
            const select = document.getElementById('selectAluno');
            if (listaAlunos.length === 0) {
                select.innerHTML = '<option value="">Nenhum aluno cadastrado</option>';
            } else {
                select.innerHTML = '<option value="">-- Selecione um aluno --</option>' + 
                    listaAlunos.map(a => `<option value="${a.id}">${a.nome} (Nota: ${a.nota || 0})</option>`).join('');
            }
            
            // Atualizar lista de alunos
            const container = document.getElementById('listaAlunos');
            if (listaAlunos.length === 0) {
                container.innerHTML = '<div class="loading">📭 Nenhum aluno cadastrado</div>';
            } else {
                container.innerHTML = listaAlunos.map(a => `
                    <div class="aluno-item">
                        <div>
                            <strong>${a.nome}</strong><br>
                            <small>${a.email}</small>
                        </div>
                        <div>
                            <span class="nota-aluno">${a.nota || 0}</span>
                        </div>
                    </div>
                `).join('');
            }
            
        } catch(e) {
            console.error('Erro ao carregar alunos:', e);
            document.getElementById('listaAlunos').innerHTML = '<div class="loading">❌ Erro ao carregar alunos. Verifique se o servidor está rodando.</div>';
            document.getElementById('selectAluno').innerHTML = '<option value="">Erro ao carregar</option>';
        }
    }

    // ========== SALVAR NOTA ==========
    document.getElementById('salvarNotaBtn').onclick = async () => {
        const alunoId = document.getElementById('selectAluno').value;
        const nota = parseFloat(document.getElementById('notaAluno').value);
        
        if (!alunoId) {
            alert('Selecione um aluno!');
            return;
        }
        
        if (isNaN(nota) || nota < 0 || nota > 10) {
            alert('Digite uma nota válida entre 0 e 10!');
            return;
        }
        
        try {
            const res = await fetch('/api/nota', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ alunoId: parseInt(alunoId), nota: nota })
            });
            
            if (res.ok) {
                alert('✅ Nota salva com sucesso!');
                document.getElementById('notaAluno').value = '';
                carregarAlunos(); // Recarregar lista
            } else {
                alert('❌ Erro ao salvar nota. Verifique se a rota /api/nota existe no backend.');
            }
        } catch(e) {
            console.error('Erro:', e);
            alert('❌ Erro de conexão. Verifique se o servidor está rodando.');
        }
    };

    // ========== NAVEGAÇÃO ==========
    document.querySelectorAll('.btn-menu').forEach(btn => {
        btn.addEventListener('click', () => {
            const pagina = btn.dataset.pagina;
            if (!pagina) return;
            
            document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            
            document.querySelectorAll('.pagina').forEach(p => p.classList.remove('ativa'));
            document.getElementById(pagina).classList.add('ativa');
        });
    });

    // ========== SAIR ==========
    document.getElementById('sairBtn').onclick = () => {
        localStorage.clear();
        window.location = '/';
    };

    // ========== INICIALIZAR ==========
    carregarAlunos();
</script>

</body>
</html>
